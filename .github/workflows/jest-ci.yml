name: Jest

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Unit, integration, security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      # Gate: unit + integration + security, with coverage. Resolves to green once
      # pre-existing failing tests are fixed (run npm run test:security to check security only).
      - name: Run Jest (CI gate)
        run: npm run test:ci
