name: Jest

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Unit, integration, security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      # Gate: unit + integration + security (see test:ci:coverage for coverage + thresholds).
      - name: Run Jest (CI gate)
        run: npm run test:ci
